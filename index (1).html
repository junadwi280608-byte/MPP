
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone - Web Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .spotify-gradient {
            background: linear-gradient(to bottom, #1db954 0%, #121212 100%);
        }

        .sidebar-item:hover {
            color: #fff;
            transition: color 0.2s ease;
        }

        .card {
            background: #181818;
            transition: background 0.3s ease;
        }

        .card:hover {
            background: #282828;
        }

        .play-btn {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .card:hover .play-btn {
            opacity: 1;
            transform: translateY(0);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .range-slider {
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: #4d4d4d;
            outline: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            display: none;
        }

        .range-slider:hover::-webkit-slider-thumb {
            display: block;
        }

        .range-slider:hover {
            background: #1db954;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-black p-6 flex flex-col gap-6 hidden md:flex">
            <div class="mb-4">
                <i class="fab fa-spotify text-3xl mb-2"></i>
                <span class="text-2xl font-bold align-middle ml-2">Spotify</span>
            </div>
            
            <nav class="flex flex-col gap-4 text-gray-400 font-bold">
                <a href="#" class="sidebar-item text-white flex items-center gap-4">
                    <i class="fas fa-home text-xl"></i> Home
                </a>
                <a href="#" class="sidebar-item flex items-center gap-4">
                    <i class="fas fa-search text-xl"></i> Search
                </a>
                <a href="#" class="sidebar-item flex items-center gap-4">
                    <i class="fas fa-book text-xl"></i> Your Library
                </a>
            </nav>

            <div class="mt-8 flex flex-col gap-4 text-gray-400 font-bold">
                <a href="#" class="sidebar-item flex items-center gap-4">
                    <div class="bg-gray-400 text-black p-1 rounded-sm"><i class="fas fa-plus"></i></div> Create Playlist
                </a>
                <a href="#" class="sidebar-item flex items-center gap-4">
                    <div class="bg-gradient-to-br from-indigo-700 to-blue-300 p-1 rounded-sm"><i class="fas fa-heart text-white"></i></div> Liked Songs
                </a>
            </div>

            <hr class="border-gray-800 my-2">

            <div class="overflow-y-auto text-sm text-gray-400 flex flex-col gap-3">
                <p class="hover:text-white cursor-pointer">Study Beats</p>
                <p class="hover:text-white cursor-pointer">Summer Hits 2024</p>
                <p class="hover:text-white cursor-pointer">Coding Focus</p>
                <p class="hover:text-white cursor-pointer">Discover Weekly</p>
                <p class="hover:text-white cursor-pointer">Daily Mix 1</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 bg-[#121212] overflow-y-auto relative pb-24">
            <!-- Header -->
            <header class="sticky top-0 z-10 p-4 flex justify-between items-center bg-transparent transition-colors duration-300" id="mainHeader">
                <div class="flex gap-4">
                    <button class="bg-black/40 rounded-full p-2 h-8 w-8 flex items-center justify-center"><i class="fas fa-chevron-left"></i></button>
                    <button class="bg-black/40 rounded-full p-2 h-8 w-8 flex items-center justify-center"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="flex items-center gap-4">
                    <button class="bg-white text-black font-bold py-1 px-4 rounded-full text-sm hover:scale-105 transition-transform">Explore Premium</button>
                    <button class="bg-black/40 rounded-full p-2 flex items-center gap-2 hover:bg-white/10">
                        <div class="bg-indigo-500 rounded-full h-7 w-7 flex items-center justify-center text-xs">J</div>
                        <span class="text-sm font-bold pr-2">junadwi</span>
                    </button>
                </div>
            </header>

            <div class="p-8">
                <h1 class="text-3xl font-bold mb-6">How's ur day</h1>

                <!-- Grid Section 1 -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
                    <div class="flex items-center bg-white/10 rounded-md overflow-hidden hover:bg-white/20 cursor-pointer group">
                        <div class="h-20 w-20 bg-indigo-600 flex items-center justify-center shadow-lg"><i class="fas fa-heart text-2xl"></i></div>
                        <span class="px-4 font-bold">Liked Songs</span>
                        <div class="ml-auto mr-4 play-btn bg-green-500 rounded-full p-3 h-10 w-10 flex items-center justify-center text-black group-hover:opacity-100"><i class="fas fa-play"></i></div>
                    </div>
                    <div class="flex items-center bg-white/10 rounded-md overflow-hidden hover:bg-white/20 cursor-pointer group">
                        <img src="https://picsum.photos/seed/p1/80/80" alt="Playlist" class="h-20 w-20">
                        <span class="px-4 font-bold">Today's Top Hits</span>
                        <div class="ml-auto mr-4 play-btn bg-green-500 rounded-full p-3 h-10 w-10 flex items-center justify-center text-black group-hover:opacity-100"><i class="fas fa-play"></i></div>
                    </div>
                    <div class="flex items-center bg-white/10 rounded-md overflow-hidden hover:bg-white/20 cursor-pointer group">
                        <img src="https://picsum.photos/seed/p2/80/80" alt="Playlist" class="h-20 w-20">
                        <span class="px-4 font-bold">Discover Weekly</span>
                        <div class="ml-auto mr-4 play-btn bg-green-500 rounded-full p-3 h-10 w-10 flex items-center justify-center text-black group-hover:opacity-100"><i class="fas fa-play"></i></div>
                    </div>
                </div>

                <!-- Sections -->
                <section class="mb-8">
                    <div class="flex justify-between items-end mb-4">
                        <h2 class="text-2xl font-bold hover:underline cursor-pointer">Made For You</h2>
                        <span class="text-gray-400 text-sm font-bold hover:underline cursor-pointer">Show all</span>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="mixGrid">
                        <!-- JS injected content -->
                    </div>
                </section>

                <section class="mb-8">
                    <div class="flex justify-between items-end mb-4">
                        <h2 class="text-2xl font-bold hover:underline cursor-pointer">Recently Played</h2>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="recentGrid">
                        <!-- JS injected content -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Player Bottom Bar -->
    <footer class="h-24 bg-black border-t border-gray-900 px-4 flex items-center justify-between z-20">
        <!-- Currently Playing -->
        <div class="flex items-center gap-4 w-1/3">
            <img id="playerImg" src="https://picsum.photos/seed/playing/60/60" alt="Album" class="rounded h-14 w-14">
            <div>
                <p id="playerTitle" class="text-sm font-bold hover:underline cursor-pointer">33x</p>
                <p id="playerArtist" class="text-xs text-gray-400 hover:text-white hover:underline cursor-pointer">perunggu</p>
            </div>
            <button class="text-gray-400 hover:text-white ml-2"><i class="far fa-heart"></i></button>
        </div>

        <!-- Player Controls -->
        <div class="flex flex-col items-center w-1/3 max-w-md">
            <div class="flex items-center gap-6 mb-2">
                <button class="text-gray-400 hover:text-white text-lg"><i class="fas fa-shuffle"></i></button>
                <button class="text-gray-400 hover:text-white text-xl"><i class="fas fa-step-backward"></i></button>
                <button id="masterPlay" class="bg-white text-black rounded-full p-3 h-10 w-10 flex items-center justify-center hover:scale-105 transition-transform">
                    <i class="fas fa-play"></i>
                </button>
                <button class="text-gray-400 hover:text-white text-xl"><i class="fas fa-step-forward"></i></button>
                <button class="text-gray-400 hover:text-white text-lg"><i class="fas fa-repeat"></i></button>
            </div>
            <div class="flex items-center gap-2 w-full">
                <span class="text-[11px] text-gray-400">1:23</span>
                <input type="range" class="range-slider w-full" value="30">
                <span class="text-[11px] text-gray-400">3:45</span>
            </div>
        </div>

        <!-- Volume Controls -->
        <div class="flex items-center justify-end gap-3 w-1/3 text-gray-400">
            <button class="hover:text-white"><i class="fas fa-microphone text-sm"></i></button>
            <button class="hover:text-white"><i class="fas fa-list text-sm"></i></button>
            <button class="hover:text-white"><i class="fas fa-laptop text-sm"></i></button>
            <div class="flex items-center gap-2">
                <i class="fas fa-volume-up text-sm"></i>
                <input type="range" class="range-slider w-20" value="70">
            </div>
        </div>
    </footer>

    <script>
        const songs = [
            { title: "Hindia", artist: "Playlist", img: "https://picsum.photos/seed/m83/200/200" },
            { title: "Sal Priadi", artist: "Playlist", img: "https://picsum.photos/seed/weeknd/200/200" },
            { title: "Raim Laode", artist: "Playlist", img: "https://picsum.photos/seed/dua/200/200" },
            { title: "Bruno mars", artist: "Playlist", img: "https://picsum.photos/seed/starboy/200/200" },
            { title: "Dewa 19", artist: "Playlist", img: "https://picsum.photos/seed/glass/200/200" }
        ];

        function createCard(song) {
            return `
                <div class="card p-4 rounded-lg cursor-pointer group" onclick="playSong('${song.title}', '${song.artist}', '${song.img}')">
                    <div class="relative mb-4">
                        <img src="${song.img}" alt="${song.title}" class="rounded-md shadow-2xl w-full aspect-square object-cover">
                        <div class="absolute bottom-2 right-2 play-btn bg-green-500 rounded-full p-4 h-12 w-12 flex items-center justify-center text-black">
                            <i class="fas fa-play text-lg ml-1"></i>
                        </div>
                    </div>
                    <h3 class="font-bold mb-1 truncate">${song.title}</h3>
                    <p class="text-gray-400 text-sm line-clamp-2">${song.artist}</p>
                </div>
            `;
        }

        function playSong(title, artist, img) {
            document.getElementById('playerTitle').innerText = title;
            document.getElementById('playerArtist').innerText = artist;
            document.getElementById('playerImg').src = img;
            
            const masterPlay = document.getElementById('masterPlay');
            masterPlay.innerHTML = '<i class="fas fa-pause"></i>';
        }

        // Initialize UI
        window.onload = () => {
            const mixGrid = document.getElementById('mixGrid');
            const recentGrid = document.getElementById('recentGrid');

            songs.forEach(song => {
                mixGrid.innerHTML += createCard(song);
            });

            // Duplicate for recent for demo
            [...songs].reverse().forEach(song => {
                recentGrid.innerHTML += createCard(song);
            });

            // Scroll Header Effect
            const mainContent = document.querySelector('main');
            const header = document.getElementById('mainHeader');
            mainContent.addEventListener('scroll', () => {
                const opacity = Math.min(mainContent.scrollTop / 200, 1);
                header.style.backgroundColor = `rgba(18, 18, 18, ${opacity})`;
            });

            // Play/Pause toggle
            document.getElementById('masterPlay').addEventListener('click', function() {
                const icon = this.querySelector('i');
                if (icon.classList.contains('fa-play')) {
                    icon.classList.replace('fa-play', 'fa-pause');
                } else {
                    icon.classList.replace('fa-pause', 'fa-play');
                }
            });
        };
    </script>
</body>
</html>
